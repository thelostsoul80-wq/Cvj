<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex flex-col items-center justify-center min-h-screen">

    <div class="text-center">
        <p class="text-xl text-gray-700 mb-6">hello</p>
        
        <div id="wallet-container">
            <button id="btn-connect" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg transition-all">
                Connect Wallet
            </button>
        </div>

        <div id="status" class="mt-4 text-sm text-gray-500"></div>
    </div>

    <script type="module">
        // استيراد مباشر من CDN موثوق
        import { createAppKit } from 'https://cdn.jsdelivr.net/npm/@reown/appkit-cdn@1.1.0/dist/appkit.js'
        import { Ethers5Adapter } from 'https://cdn.jsdelivr.net/npm/@reown/appkit-adapter-ethers5-cdn@1.1.0/dist/appkit-adapter-ethers5.js'

        const projectId = 'Cb431b6f6e2a73a72983084a5bd30989';

        try {
            const modal = createAppKit({
                adapters: [new Ethers5Adapter()],
                networks: [{
                    id: 1,
                    name: 'Ethereum',
                    network: 'mainnet',
                    nativeCurrency: { name: 'Ether', symbol: 'ETH', decimals: 18 },
                    rpcUrls: { default: { http: ['https://cloudflare-eth.com'] } }
                }],
                projectId: projectId,
                metadata: {
                    name: 'Test App',
                    url: window.location.origin
                }
            });

            // ربط الزر اليدوي بفتح النافذة
            document.getElementById('btn-connect').addEventListener('click', () => {
                modal.open();
            });

            document.getElementById('status').innerText = "تم تحميل النظام بنجاح";
        } catch (e) {
            console.error(e);
            document.getElementById('status').innerText = "خطأ في تحميل المكتبة: " + e.message;
        }
    </script>
</body>
</html>
