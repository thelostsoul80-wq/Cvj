<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 App</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: sans-serif;
            background-color: #f4f4f9;
        }
        p { font-size: 20px; color: #333; }
        /* نضمن أن الحاوية لها مساحة لتجنب اختفاء الزر */
        #button-container {
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <p>hello</p>
    
    <div id="button-container">
        <appkit-button></appkit-button>
    </div>

    <script type="module">
        // استيراد المكتبات بنسخ محددة لضمان الاستقرار
        import { createAppKit } from 'https://esm.sh/@reown/appkit@1.1.0'
        import { Ethers5Adapter } from 'https://esm.sh/@reown/appkit-adapter-ethers5@1.1.0'
        import { mainnet, arbitrum } from 'https://esm.sh/@reown/appkit/networks'

        const projectId = 'Cb431b6f6e2a73a72983084a5bd30989';

        try {
            const modal = createAppKit({
                adapters: [new Ethers5Adapter()],
                networks: [mainnet, arbitrum],
                metadata: {
                    name: 'My Web3 Site',
                    description: 'Connect Wallet Test',
                    url: window.location.origin,
                    icons: ['https://avatars.githubusercontent.com/u/37784886']
                },
                projectId: projectId,
                features: {
                    analytics: true
                }
            });
            console.log("AppKit Initialized Successfully");
        } catch (error) {
            console.error("Initialization failed:", error);
            document.getElementById('button-container').innerHTML = '<p style="color:red">فشل تحميل محرك الربط</p>';
        }
    </script>
</body>
</html>
